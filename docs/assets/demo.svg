  <text x="380" y="21" fill="#8b949e" text-anchor="middle">colcast — messy headers in, canonical schema out</text>

  <text x="24" y="62" fill="#7ee787">$ colcast map messy.csv --schema contacts.schema.json</text>
  <text x="24" y="86" fill="#8b949e">#  header                  -&gt;  field       via      score</text>
  <text x="24" y="106" fill="#c9d1d9">0  E-Mail Address          -&gt;  <tspan fill="#79c0ff">email</tspan>       <tspan fill="#d2a8ff">pattern</tspan>  1.00</text>
  <text x="24" y="126" fill="#c9d1d9">1  firstName               -&gt;  <tspan fill="#79c0ff">first_name</tspan>  <tspan fill="#7ee787">exact</tspan>    1.00</text>
  <text x="24" y="146" fill="#c9d1d9">2  SURNAME                 -&gt;  <tspan fill="#79c0ff">last_name</tspan>   <tspan fill="#a5d6ff">alias</tspan>    1.00</text>
  <text x="24" y="166" fill="#c9d1d9">4  Licence Count           -&gt;  <tspan fill="#79c0ff">seats</tspan>       <tspan fill="#d29922">fuzzy</tspan>    0.94</text>
  <text x="24" y="186" fill="#c9d1d9">6  Sign-up Date            -&gt;  <tspan fill="#79c0ff">signed_up</tspan>   <tspan fill="#d29922">fuzzy</tspan>    0.96</text>
  <text x="24" y="206" fill="#8b949e">unmapped columns (1): "Internal Notes"</text>

  <text x="24" y="240" fill="#7ee787">$ colcast cast messy.csv --schema contacts.schema.json --report report.json</text>
  <text x="24" y="264" fill="#c9d1d9">email,first_name,last_name,company,seats,mrr,signed_up,active,plan</text>
  <text x="24" y="284" fill="#c9d1d9">ada@example.test,Ada,Lovelace,…,120,<tspan fill="#79c0ff">4860</tspan>,<tspan fill="#79c0ff">2024-11-03</tspan>,<tspan fill="#79c0ff">true</tspan>,<tspan fill="#79c0ff">enterprise</tspan></text>
  <text x="24" y="304" fill="#8b949e">← "$4,860.00" · "yes" · "Enterprise" all cast to canonical forms</text>

  <text x="24" y="338" fill="#7ee787">$ colcast check messy.csv --schema contacts.schema.json</text>
  <text x="24" y="362" fill="#c9d1d9">cast failures: 2   <tspan fill="#ff7b72">seats: row 4 "not sure"</tspan> · <tspan fill="#ff7b72">signed_up: row 4 "2024-13-45"</tspan></text>
